<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    
    <link rel="manifest" href="/manifest.json">
    
    <meta name="mobile-web-app-capable" content="yes">
    
    <meta name="theme-color" content="#4285f4">
    
    <link rel="apple-touch-icon" href="/icons/icon-152x152.png">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <title>Мои заметки</title>
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <link rel="icon" href="icons/icon-48x48.png" sizes="48x48" type="image/png">
    
    <style>
        #notes-list li {
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            background: #f5f5f5;
            border-radius: 8px;
            list-style: none;
        }
        .delete-btn:hover {
            background: #c82333 !important;
        }
    </style>
</head>
<body>
    <div class="container" style="padding: 1rem;">
        <h1>Мои заметки</h1>
        <form id="note-form" class="row" style="margin-bottom: 1rem;">
            <input class="col-9" type="text" id="note-input" placeholder="Введите заметку" required>
            <button class="col-3" type="submit">Добавить</button>
        </form>
        <ul id="notes-list" style="margin-top: 1rem; padding-left: 0;"></ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
